# It allows for programmatic generation and consistent styling across documentation.

- name: CI Build Status
  type: github-action
  workflow: ci.yml
  repo: chirag127/SponsorBlock-CrowdSource-Media-Segment-Filter-Browser-Extension
  branch: main
  style: flat-square
  link: https://github.com/chirag127/SponsorBlock-CrowdSource-Media-Segment-Filter-Browser-Extension/actions/workflows/ci.yml

- name: Code Coverage
  type: codecov
  repo: chirag127/SponsorBlock-CrowdSource-Media-Segment-Filter-Browser-Extension
  branch: main
  style: flat-square
  link: https://codecov.io/gh/chirag127/SponsorBlock-CrowdSource-Media-Segment-Filter-Browser-Extension/branch/main

- name: Language: TypeScript
  type: custom
  label: Language
  message: TypeScript
  color: 3178C6
  logo: typescript
  style: flat-square
